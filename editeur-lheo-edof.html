<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Editeur LHEO 2.3 / EDOF</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#1a56db;--prl:#e8f0fe;--prd:#1648c0;--ok:#0e7a4e;--err:#b91c1c;
  --g0:#f9fafb;--g1:#f3f4f6;--g2:#e5e7eb;--g3:#d1d5db;--g5:#6b7280;--g7:#374151;--g9:#111827;--r:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--g9);background:var(--g0)}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:268px;min-width:268px;background:#fff;border-right:1px solid var(--g2);display:flex;flex-direction:column}
.sb-head{padding:12px 14px;border-bottom:1px solid var(--g2)}
.sb-head h1{font-size:13px;font-weight:700;color:var(--pri)}
.sb-head p{font-size:10px;color:var(--g5);margin-top:2px}
.sb-bar{padding:7px 9px;border-bottom:1px solid var(--g2)}
.sb-list{flex:1;overflow-y:auto;padding:5px}
.sb-foot{padding:7px 9px;border-top:1px solid var(--g2);display:flex;gap:5px}
.fi{padding:8px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;position:relative}
.fi:hover{background:var(--g0);border-color:var(--g2)}.fi.active{background:var(--prl);border-color:var(--pri)}
.fi-t{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:196px}
.fi-m{font-size:10px;color:var(--g5);margin-top:1px}
.fi-x{position:absolute;right:5px;top:50%;transform:translateY(-50%);opacity:0;background:none;border:none;cursor:pointer;color:var(--err);font-size:14px;padding:2px 5px}
.fi:hover .fi-x{opacity:1}
.empty-msg{padding:18px 10px;text-align:center;color:var(--g5);font-size:12px;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;border:1px solid var(--g2);background:#fff;color:var(--g7);white-space:nowrap}
.btn:hover{background:var(--g0)}.btn-p{background:var(--pri);color:#fff;border-color:var(--pri)}.btn-p:hover{background:var(--prd)}
.btn-ok{background:var(--ok);color:#fff;border-color:var(--ok)}.btn-ok:hover{background:#0c6640}
.btn-err{background:var(--err);color:#fff;border-color:var(--err)}.btn-err:hover{background:#991b1b}
.btn-sm{padding:3px 7px;font-size:11px}.btn-full{width:100%;justify-content:center}
.main{flex:1;overflow-y:auto;background:var(--g0)}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:40px;text-align:center}
.welcome h2{font-size:18px;font-weight:600;color:var(--g7)}
.welcome p{font-size:13px;color:var(--g5);max-width:400px;line-height:1.6}
.ed{padding:18px 22px;max-width:920px}
.ed-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ed-head h2{font-size:15px;font-weight:600}
.sec{background:#fff;border:1px solid var(--g2);border-radius:var(--r);margin-bottom:9px}
.sec-h{padding:8px 12px;background:var(--g0);border-bottom:1px solid var(--g2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.sec-h span{font-size:12px;font-weight:600;color:var(--g7)}
.sec-arr{color:var(--g5);transition:transform .2s;font-size:13px}
.sec-arr.open{transform:rotate(180deg)}
.sec-b{padding:12px;display:none}.sec-b.open{display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fitem{display:flex;flex-direction:column;gap:3px}
.fitem.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;color:var(--g7)}
.req{color:var(--err)}
input,select,textarea{width:100%;padding:5px 8px;border:1px solid var(--g3);border-radius:5px;font-size:12px;font-family:inherit;color:var(--g9);background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 2px rgba(26,86,219,.1)}
textarea{resize:vertical;min-height:68px;line-height:1.5}
.hint{font-size:10px;color:var(--g5)}
.hint-type{font-size:11px;color:#1565C0;background:#E3F2FD;padding:4px 8px;border-radius:4px;margin:4px 0 0 0;display:inline-block}
.cc{font-size:10px;color:var(--g5);text-align:right}
/* select filtrable */
.sf-wrap{display:flex;flex-direction:column}
.sf-inp{border-radius:5px 5px 0 0!important;border-bottom:1px solid var(--g3)!important;background:var(--g0)!important}
.sf-inp:focus{border-color:var(--pri)!important;background:#fff!important}
.sf-list{border:1px solid var(--g3);border-top:none;border-radius:0 0 5px 5px;font-size:11px;font-family:inherit;height:110px;cursor:pointer}
.sf-list:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 2px rgba(26,86,219,.1)}
.tag-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;min-height:20px;align-items:center}
.tp{display:inline-flex;align-items:center;gap:2px;background:var(--prl);color:var(--pri);font-size:11px;font-weight:500;padding:2px 6px;border-radius:10px}
.tp button{background:none;border:none;cursor:pointer;color:var(--pri);font-size:13px;line-height:1;padding:0}
/* subsec */
.ss{border:1px solid var(--g2);border-radius:5px;padding:10px;margin-top:9px;background:var(--g0)}
.ss-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ss-t{font-size:11px;font-weight:600;color:var(--g7)}
.add-row{display:flex;justify-content:flex-end;margin-top:8px}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--r);width:min(720px,96vw);max-height:88vh;overflow:auto;padding:18px}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.xml-box{background:#1a1a2e;color:#a6e3a1;border-radius:6px;padding:12px;font-family:monospace;font-size:11px;overflow:auto;max-height:480px;white-space:pre;line-height:1.6;margin-top:9px}
.notif{position:fixed;bottom:14px;right:14px;padding:9px 14px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:0 3px 10px rgba(0,0,0,.18);z-index:99;display:none}
.n-ok{background:var(--ok);color:#fff}.n-err{background:var(--err);color:#fff}
#file-in{display:none}
.bdg{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;margin-left:4px;vertical-align:middle}
.b-r{background:#fee2e2;color:#991b1b}.b-o{background:var(--g1);color:var(--g5)}

/* Validation visuelle */
.field-err input,.field-err select,.field-err textarea{border-color:var(--err)!important;background:#fff8f8!important;}
.field-err label::after{content:' ← Obligatoire';color:var(--err);font-size:10px;font-weight:600;}
.val-banner{background:#fff0f0;border:1px solid var(--err);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;}
.val-banner ul{margin:6px 0 0 18px;}
.val-banner li{margin-bottom:3px;color:var(--err);}
.val-banner strong{color:var(--err);}
.siret-ok{font-size:10px;color:var(--ok);margin-top:2px;}
.siret-err{font-size:10px;color:var(--err);margin-top:2px;}
.rs-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;font-size:11px;font-weight:500;border-radius:5px;cursor:pointer;border:1px solid var(--pri);background:var(--prl);color:var(--pri);margin-top:4px;}
.rs-btn:hover{background:var(--pri);color:#fff;}
.rs-status{font-size:11px;color:var(--g5);margin-top:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="sb">
    <div class="sb-head"><h1>Editeur LHEO 2.3 / EDOF</h1><p>Format XML LHEO 2.3.3 · compatible EDOF 2026</p></div>
    <div class="sb-bar"><button class="btn btn-p btn-full" id="J_new">+ Nouvelle fiche</button></div>
    <div class="sb-list" id="J_list"></div>
    <div class="sb-foot">
      <button class="btn" style="flex:1" id="J_imp">Importer XML</button>
      <button class="btn btn-ok" style="flex:1" id="J_expAll">Exporter tout</button>
    </div>
    <div class="sb-foot" style="border-top:1px solid var(--border);padding-top:5px;gap:4px">
      <button class="btn btn-sm" style="flex:1;font-size:10px" id="J_saveData" title="Sauvegarder toutes les fiches dans un fichier .json pour les retrouver sur un autre navigateur">&#128190; Sauvegarder fiches</button>
      <button class="btn btn-sm" style="flex:1;font-size:10px" id="J_loadData" title="Restaurer des fiches depuis un fichier .json precedemment sauvegarde">&#128194; Restaurer fiches</button>
    </div>
    <input type="file" id="file-data" accept=".json" style="display:none">
  </div>
  <div class="main" id="J_main"></div>
</div>
<div class="modal-bg" id="J_modal">
  <div class="modal">
    <div class="modal-h"><strong style="font-size:13px">Apercu XML LHEO 2.3</strong><button class="btn btn-sm" id="J_mc">Fermer</button></div>
    <div style="display:flex;gap:6px"><button class="btn btn-p btn-sm" id="J_copy">Copier</button><button class="btn btn-ok btn-sm" id="J_dlXml">Telecharger</button></div>
    <pre class="xml-box" id="J_xmlPre"></pre>
  </div>
</div>
<div class="notif" id="J_notif"></div>
<input type="file" id="file-in" accept=".xml">

/* Composant select filtrable */
function buildSF(uid,data,initVals,maxSel){
  var opts=data.map(function(d){return '<option value="'+d[0]+'">'+d[1]+'</option>';}).join('');
  return '<div class="sf-wrap">'+
    '<input class="sf-inp" id="sf_i_'+uid+'" placeholder="Filtrer..." autocomplete="off">'+
    '<select class="sf-list" id="sf_s_'+uid+'" size="6">'+opts+'</select>'+
    '</div>'+
    '<div class="tag-bar" id="sf_t_'+uid+'"></div>'+
    '<span class="hint">Cliquer sur une ligne pour selectionner (max '+maxSel+'). Filtrer par code ou mot-cle.</span>';}

function bindSF(uid,data,maxSel,initVals){
  var inp=$('sf_i_'+uid),sel=$('sf_s_'+uid),bar=$('sf_t_'+uid);
  if(!inp||!sel||!bar)return;
  // init tags
  (initVals||[]).forEach(function(v){addTag(bar,v,maxSel);});
  // filtrage
  inp.addEventListener('input',function(){
    var q=inp.value.toLowerCase();
    Array.from(sel.options).forEach(function(o){
      o.style.display=(q===''||o.text.toLowerCase().indexOf(q)>=0)?'':'none';});
  });
  // selection
  sel.addEventListener('change',function(){
    var o=sel.options[sel.selectedIndex];if(!o)return;
    addTag(bar,o.value,maxSel);sel.selectedIndex=-1;
  });
}

function addTag(bar,val,max){
  var existing=Array.from(bar.querySelectorAll('.tp')).map(function(p){return p.dataset.v;});
  if(existing.indexOf(val)>=0)return;
  if(max&&existing.length>=max){toast('Maximum '+max+' codes',true);return;}
  var sp=document.createElement('span');
  sp.className='tp';sp.dataset.v=val;
  // afficher seulement le code (avant " - ")
  var label=val.indexOf(' - ')>=0?val.split(' - ').slice(0,2).join(' - '):val;
  sp.innerHTML=esc(label)+' <button type="button">x</button>';
  sp.querySelector('button').addEventListener('click',function(){sp.remove();});
  bar.appendChild(sp);
}
function getTags(tagBarId){
  var b=$(tagBarId);
  return b?Array.from(b.querySelectorAll('.tp')).map(function(p){
    return (p.dataset.v||'').split(' - ')[0].trim();
  }):[];
}

function drawList(){
  var el=$('J_list');el.innerHTML='';
  if(!cat.length){el.innerHTML='<div class="empty-msg">Aucune formation.<br>Cliquez sur + Nouvelle fiche.</div>';return;}
  cat.forEach(function(f){
    var d=document.createElement('div');
    d.className='fi'+(f.id===curId?' active':'');
    d.innerHTML='<div class="fi-t">'+esc(f.intitule||'(Sans titre)')+'</div>'+
      '<div class="fi-m">'+((f.actions||[]).length)+' action(s) - '+(f.certif==='O'?'Certif.':'Non certif.')+'</div>'+
      '<button class="fi-x">x</button>';
    d.querySelector('.fi-x').addEventListener('click',function(e){
      e.stopPropagation();
      if(confirm('Supprimer cette fiche ?')){
        cat=cat.filter(function(x){return x.id!==f.id;});persist();
        if(curId===f.id){curId=null;showWelcome();}drawList();}});

    el.appendChild(d);
  });
}

   ============================================================== */
function collect(fid){
  var f=cat.find(function(x){return x.id===fid;});if(!f)return;
  function g(id){var e=$(id);return e?e.value:'';}
  f.intitule=g('E_intitule');f.numIntOf=g('E_num');f.siret=g('E_siret');
  f.typeOffre=g('E_typeoffre')||'certification';
  f.objGen=g('E_objgen');f.certif=g('E_certif');f.parcours=g('E_parcours');
  f.rncp=g('E_rncp');f.rs=g('E_rs');f.cpf=g('E_cpf');f.certifinfo=g('E_certifinfo');
  // Normaliser : ajouter le préfixe automatiquement si l'utilisateur n'a saisi que des chiffres
  if(f.rncp&&/^\d+$/.test(f.rncp.trim()))f.rncp='RNCP'+f.rncp.trim();
  if(f.rs&&/^\d+$/.test(f.rs.trim()))f.rs='RS'+f.rs.trim();
  f.resumeContenu=g('E_resumec');
  if(f.cpf==='CPF200')f.categorisationOffre=g('E_catoffre');else f.categorisationOffre='';
  // Blocs de compétences (RNCP uniquement)
  if(f.rncp){
    var blocsInputs=document.querySelectorAll('[id^="E_bloc_"]');
    // Récupérer les valeurs saisies (code seulement) et fusionner avec les intitulés mémorisés
    var blocsExistants=f.blocsCompetences||[];
    f.blocsCompetences=Array.from(blocsInputs).map(function(el,i){
      var codeInput=el.value.trim();
      if(!codeInput)return '';
      // Si l'entrée existante a un intitulé et que le code correspond, conserver l'intitulé
      var existing=blocsExistants[i]||'';
      var existingCode=existing.split('||')[0];
      var existingLabel=existing.split('||')[1]||'';
      if(existingCode===codeInput&&existingLabel)return codeInput+'||'+existingLabel;
      return codeInput;
    }).filter(function(v){return v;});
    var modEl=$('E_blocsmod');
    f.blocsModifiables=modEl&&modEl.checked?'1':'0';
  } else {
    f.blocsCompetences=[];f.blocsModifiables='0';
  }
  f.nivE=g('E_nive');f.nivS=g('E_nivs');
  f.objectif=g('E_obj');f.contenu=g('E_cont');f.resultats=g('E_res');
  f.rythme=g('E_rythme');f.url=g('E_url');
  f.raisonSociale=g('E_rs_org');f.numActivite=g('E_nda');f.codeUAI=g('E_uai');
  f.formacode=getTags('sf_t_fc');
  f.nsf=getTags('sf_t_nsf');
  f.rome=getTags('sf_t_rome');
  $('J_main').querySelectorAll('[data-ai][data-f]').forEach(function(el){
    var ai=parseInt(el.dataset.ai);if(!f.actions[ai])return;
    f.actions[ai][el.dataset.f]=el.value;});
  $('J_main').querySelectorAll('[data-ai][data-si][data-fs]').forEach(function(el){
    var ai=parseInt(el.dataset.ai),si=parseInt(el.dataset.si);
    if(!f.actions[ai]||!f.actions[ai].sessions[si])return;
    f.actions[ai].sessions[si][el.dataset.fs]=el.value;});}

// Règles de validation : [id_champ, label_lisible, condition_erreur]
function validateFiche(f){
  var errs=[];

  // Niveau formation
  if(!f.intitule||f.intitule.trim().length<3) errs.push({field:'E_intitule',msg:'Intitulé manquant (min 3 car.)'});
  if(!f.numIntOf||f.numIntOf.trim().length<1) errs.push({field:'E_num',msg:'N° interne OF manquant'});
  if(!f.siret||f.siret.replace(/\s/g,'').length!==14) errs.push({field:'E_siret',msg:'SIRET invalide (14 chiffres requis)'});
  if(!luhnSiret(f.siret)) errs.push({field:'E_siret',msg:'SIRET invalide (clé Luhn incorrecte)'});
  if(!f.objectif||f.objectif.trim().length<10) errs.push({field:'E_obj',msg:'Objectif pédagogique manquant (min 10 car.)'});
  if(!f.contenu||f.contenu.trim().length<10) errs.push({field:'E_cont',msg:'Contenu manquant (min 10 car.)'});
  if(!f.resultats||f.resultats.trim().length<10) errs.push({field:'E_res',msg:'Résultats attendus manquants'});
  if(!f.resumeContenu||f.resumeContenu.trim().length<5) errs.push({field:'E_resumec',msg:'Points forts manquants (max 255 car.)'});
  var to=f.typeOffre||'certification';
  var isVaeV=(to==='vae'||f.cpf==='CPF200');
  var isPermisV=(to==='permis');
  // FORMACODE obligatoire sauf VAE (remplacé par categorisation) et Permis
  if(!isVaeV&&!isPermisV&&(!f.formacode||!f.formacode.length))
    errs.push({field:'sf_t_fc',msg:'Au moins 1 code FORMACODE requis'});
  // NSF obligatoire sauf Permis
  if(!isPermisV&&(!f.nsf||!f.nsf.length))
    errs.push({field:'sf_t_nsf',msg:'Au moins 1 code NSF requis'});
  // Certification : RNCP/RS pour formation certifiante, CPF pour les autres
  if(to==='certification'&&!f.rncp&&!f.rs)
    errs.push({field:'E_rncp',msg:'Code RNCP ou RS obligatoire pour une formation certifiante'});
  if((to==='bilan')&&f.cpf!=='CPF202')
    errs.push({field:'E_cpf',msg:'Code CPF202 obligatoire pour un bilan de compétences'});
  if(isPermisV&&!f.cpf)
    errs.push({field:'E_cpf',msg:'Type de permis obligatoire'});
  if(isVaeV&&!f.categorisationOffre)
    errs.push({field:'E_catoffre',msg:'Catégorisation (domaine 3 chiffres) obligatoire pour la VAE'});
  // Organisme
  if(!f.raisonSociale||f.raisonSociale.trim().length<2) errs.push({field:'E_rs_org',msg:'Raison sociale manquante'});
  // Actions
  if(!f.actions||!f.actions.length) errs.push({field:null,msg:'Au moins 1 action requise'});
  (f.actions||[]).forEach(function(a,i){
    if(!a.num) errs.push({field:null,msg:'Action '+(i+1)+' : N° interne manquant'});
    if(!a.prix||parseFloat(a.prix)<=0) errs.push({field:null,msg:'Action '+(i+1)+' : Prix TTC manquant'});
    if(!a.duree||parseFloat(a.duree)<=0) errs.push({field:null,msg:'Action '+(i+1)+' : Durée manquante'});
    if(!a.adr) errs.push({field:null,msg:'Action '+(i+1)+' : Adresse manquante'});
    if(!a.cp||!/^\d{5}$/.test(a.cp)) errs.push({field:null,msg:'Action '+(i+1)+' : Code postal invalide (5 chiffres)'});
    if(!a.ville) errs.push({field:null,msg:'Action '+(i+1)+' : Ville manquante'});
    if(!a.sessions||!a.sessions.length) errs.push({field:null,msg:'Action '+(i+1)+' : Au moins 1 session requise'});
    (a.sessions||[]).forEach(function(s,j){
      if(!s.num) errs.push({field:null,msg:'Action '+(i+1)+' / Session '+(j+1)+' : N° session manquant'});
      if(a.entSor!=='1'&&(!s.debut||!s.fin)) errs.push({field:null,msg:'Action '+(i+1)+' / Session '+(j+1)+' : Dates manquantes'});
    });
    // Anti-doublon action (erreur 30056 EDOF)
    (f.actions||[]).forEach(function(b,j){
      if(j<=i) return;
      if(a.modEns===b.modEns&&a.cp===b.cp&&a.lang===b.lang&&a.prix===b.prix){
        var da=parseFloat(a.duree||0),db=parseFloat(b.duree||0);
        if(Math.abs(da-db)<10) errs.push({field:null,
          msg:'Actions '+(i+1)+' et '+(j+1)+' trop similaires (EDOF erreur 30056/30057) - vérifiez modalités, lieu, durée'});
      }
    });
  });
  return errs;
}

// Afficher/masquer les erreurs dans le formulaire
function showValidation(errs){
  // Nettoyer les erreurs précédentes
  document.querySelectorAll('.field-err').forEach(function(el){el.classList.remove('field-err');});
  var old=$('val-banner');if(old)old.remove();

  if(!errs||!errs.length) return true;

  // Banner en haut de l'éditeur
  var banner=document.createElement('div');
  banner.id='val-banner';
  banner.className='val-banner';
  banner.innerHTML='<strong>'+errs.length+' erreur(s) à corriger avant export :</strong><ul>'+
    errs.map(function(e){return '<li>'+e.msg+'</li>';}).join('')+'</ul>';
  var edHead=$('.ed-head')||document.querySelector('.ed-head');
  if(edHead) edHead.parentNode.insertBefore(banner,edHead.nextSibling);

  // Surligner les champs en rouge
  errs.forEach(function(e){
    if(!e.field) return;
    var el=$(e.field);
    if(el){
      var parent=el.closest('.fitem')||el.parentElement;
      if(parent) parent.classList.add('field-err');
    }
  });
  return false;
}

/* ==============================================================
   VALIDATION SIRET (algorithme de Luhn)
   ============================================================== */
function luhnSiret(siret){
  if(!siret) return false;
  var s=siret.replace(/[\s\-]/g,'');
  if(!/^\d{14}$/.test(s)) return false;
  var sum=0;
  for(var i=0;i<14;i++){
    var d=parseInt(s[13-i]);
    if(i%2===1){d*=2;if(d>9)d-=9;}
    sum+=d;
  }
  return sum%10===0;
}

// Vérification SIRET en temps réel + API INSEE
function checkSiretField(val,statusEl){
  if(!val||val.replace(/\s/g,'').length!==14){
    if(statusEl) statusEl.innerHTML='<span class="siret-err">14 chiffres requis</span>';
    return;
  }
  if(!luhnSiret(val)){
    if(statusEl) statusEl.innerHTML='<span class="siret-err">Clé SIRET invalide</span>';
    return;
  }
  if(statusEl) statusEl.innerHTML='<span class="siret-ok">✓ Format SIRET valide</span>';
  // Vérification INSEE via API annuaire-entreprises
  var siret=val.replace(/\s/g,'');
  fetch('https://recherche-entreprises.api.gouv.fr/search?q='+siret+'&page=1&per_page=1')
    .then(function(r){return r.json();})
    .then(function(data){
      var res=data&&data.results&&data.results[0];
      if(res){
        var nom=res.nom_raison_sociale||res.nom_complet||'';
        var etat=res.etat_administratif;
        if(etat==='A'){
          statusEl.innerHTML='<span class="siret-ok">✓ '+escEl(nom)+' — actif</span>';
        } else {
          statusEl.innerHTML='<span class="siret-err">⚠ '+escEl(nom)+' — état: '+escEl(etat||'?')+'</span>';
        }
      } else {
        statusEl.innerHTML='<span class="siret-err">SIRET non trouvé dans la base INSEE</span>';
      }
    })
    .catch(function(){
      // Silencieux si pas de connexion
      if(statusEl&&statusEl.innerHTML.indexOf('Format')>=0)
        statusEl.innerHTML='<span class="siret-ok">✓ Format SIRET valide</span>';
    });
}

/* ==============================================================
   IMPORT RS (Répertoire Spécifique) via API France Compétences
   ============================================================== */
function fetchRS(){
  var L=window._lheo;
  if(!L){alert('Logiciel non prêt');return;}
  L.doSave(L.curId,true);
  var ff=L.cat.find(function(x){return x.id===L.curId;});
  if(!ff||!ff.rs){alert('Saisissez un code RS (ex: RS5267 ou 5267) et enregistrez');return;}
  var rs=ff.rs.trim().toUpperCase();
  if(/^\d+$/.test(rs)) rs='RS'+rs;
  if(!/^RS\d+$/.test(rs)){alert('Format invalide. Exemples: RS5267 ou 5267');return;}
  var st=$('E_rs_status');
  if(st) st.textContent='Chargement '+rs+'...';
  var num=rs.replace('RS','');
  fetch('https://api.francecompetences.fr/api/rs/'+num)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(data){
      applyRSData(ff,rs,data,st);
    })
    .catch(function(e1){
      // Essai via proxy CORS alternatif
      fetch('https://api.apprentissage.beta.gouv.fr/api/certification/v1?code_certif='+rs)
        .then(function(r){return r.json();})
        .then(function(data){applyRSData(ff,rs,data&&data[0]?data:[{id:rs}],st);})
        .catch(function(){
          if(st) st.textContent='';
          alert(rs+' : impossible de récupérer les données (vérifiez votre connexion)');
        });
    });
}

function applyRSData(ff,rs,data,st){
  var L=window._lheo;
  var d=Array.isArray(data)?data[0]:data;
  if(!d){alert(rs+' introuvable dans France Compétences');if(st)st.textContent='';return;}
  var maj=[];
  // Intitulé
  var intitule=(d.intitule||d.libelle||d.label||'');
  if(intitule&&!ff.intitule){ff.intitule=intitule;maj.push('intitulé');}
  // Niveau
  var niv=d.niveau_europeen||(d.niveau&&d.niveau.europeen)||(d.nomenclature_europe&&d.nomenclature_europe.niveauEn);
  if(niv){var m={'2':'3','3':'3','4':'4','5':'5','6':'6','7':'7','8':'8'};
    ff.nivS=m[String(niv)]||ff.nivS;maj.push('niveau');}
  // NSF
  var nsf=(d.nsf||[]).map?d.nsf:[];
  if(nsf.length&&(!ff.nsf||!ff.nsf.length)){
    ff.nsf=nsf.map(function(n){return n.code||n;}).slice(0,3);maj.push('NSF');}
  // FORMACODE
  var fc=(d.formacode||d.formacodes||[]);
  if(fc.length&&(!ff.formacode||!ff.formacode.length)){
    ff.formacode=fc.map(function(n){return n.code||n;}).slice(0,5);maj.push('FORMACODE');}
  ff.certif='O';
  if(st) st.textContent='';
  L.persist();L.openEditor(L.curId);
  alert('Import RS OK pour '+rs+'\nChamps importés : '+(maj.length?maj.join(', '):'aucun nouveau'));
}

  clone.id=uid();
  clone.numIntOf=f.numIntOf?f.numIntOf+'_copie':'';
  clone.intitule=f.intitule?'Copie - '+f.intitule:'';

  clone.actions.forEach(function(a,i){

    a.sessions.forEach(function(s,j){s.num=s.num?s.num+'_c':'';});

  cat.push(clone);persist();drawList();
  openEditor(clone.id);

}

        f.categorisationOffre=extForm?tx(extForm,'extra[info="categorisation-offre"]'):'';
        // Blocs de compétences
        if(extForm){
          var blocsEl=extForm.querySelector('extra[info="blocs-competences"]');
          f.blocsCompetences=blocsEl?Array.from(blocsEl.querySelectorAll('extra[info="code-bloc"]')).map(function(e){return e.textContent.trim();}).filter(Boolean):[];
          f.blocsModifiables=extForm?tx(extForm,'extra[info="blocs-modifiables"]')||'0':'0';
        }
        f.nivE=tx(fEl,'code-niveau-entree')||'0';f.nivS=tx(fEl,'code-niveau-sortie')||'0';
        f.objectif=tx(fEl,'objectif-formation');f.contenu=tx(fEl,'contenu-formation');
        f.resultats=tx(fEl,'resultats-attendus');f.rythme=tx(fEl,'rythme-formation');
        f.raisonSociale=tx(fEl,'raison-sociale')||tx(fEl,'raison-sociale-formateur');
        f.numActivite=tx(fEl,'numero-activite');
        f.formacode=Array.from(fEl.querySelectorAll('code-FORMACODE')).map(function(c){return c.textContent.trim();});
        f.nsf=Array.from(fEl.querySelectorAll('code-NSF')).map(function(c){return c.textContent.trim();});
        f.rome=Array.from(fEl.querySelectorAll('code-ROME')).map(function(c){return c.textContent.trim();});
        fEl.querySelectorAll('action').forEach(function(aEl){
          var lieu=aEl.querySelector('lieu-formation');var a=emptyAction();
          a.num=aEl.getAttribute('numero')||'';
          a.modEns=tx(aEl,'modalites-enseignement')||'0';
          a.entSor=tx(aEl,'modalites-entrees-sorties')||'0';
          a.prereq=tx(aEl,'conditions-specifiques');
          a.modPed=tx(aEl,'modalites-pedagogiques');
          a.handicap=tx(aEl,'acces-handicapes');
          a.priseCharge=tx(aEl,'prise-en-charge-frais-possible');
          a.restauration=tx(aEl,'restauration');a.hebergement=tx(aEl,'hebergement');a.transport=tx(aEl,'transport');
          a.perim=tx(aEl,'code-perimetre-recrutement')||'0';
          a.duree=tx(aEl,'nombre-heures-centre');
          a.dureeEntreprise=tx(aEl,'nombre-heures-entreprise');
          // extras action
          var extAct=aEl.querySelector('extras[info="action"]');
          if(extAct){
            var frais=extAct.querySelector('extras[info="frais-pedagogiques"]');
            if(frais){a.tva=tx(frais,'extra[info="taux-tva"]')||'0.0';a.prix=tx(frais,'extra[info="frais-ht"]')||'';}
            a.certifInclus=tx(extAct,'extra[info="frais-certif-inclus-frais-anpec"]')||'0';
            var ci=extAct.querySelector('extra[info="contact-information"] coordonnees');
            if(ci){a.tel=tx(ci,'numtel');a.email=tx(ci,'courriel');}
          }
          if(lieu){a.adr=tx(lieu,'ligne');a.cp=tx(lieu,'codepostal');a.ville=tx(lieu,'ville');
            a.dep=tx(lieu,'departement');a.reg=tx(lieu,'region')||'84';a.pays=tx(lieu,'pays')||'FR';
            var coord=lieu.querySelector('coordonnees');
            if(coord&&!a.tel){a.tel=tx(coord,'numtel');a.email=tx(coord,'courriel');}
          }
          aEl.querySelectorAll('session').forEach(function(sEl){
            var p=tx(sEl,'prix-total-TTC')||tx(sEl,'prix-total-ttc');if(p&&!a.prix)a.prix=p;
            var dh=tx(sEl,'nombre-heures-total');if(dh&&!a.duree)a.duree=dh;
            function fd(s){return s?s.replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3'):'';}
            a.sessions.push({num:sEl.getAttribute('numero')||'',
              debut:fd(tx(sEl,'debut')),fin:fd(tx(sEl,'fin')),
              indColl:tx(sEl,'individuelle-collective')||'0',
              placesTotal:tx(sEl,'nb-places-total')||tx(sEl,'places-total'),
              placesFinancees:tx(sEl,'nb-places-financees'),
              email:tx(sEl,'courriel'),tel:tx(sEl,'numtel'),urlSess:''});});
          f.actions.push(a);});
        cat.push(f);last=f.id;n++;});
      persist();drawList();toast(n+' formation(s) importee(s)');
      if(last)openEditor(last);}
    catch(err){toast('Erreur : '+err.message,true);}};
  r.readAsText(file);e.target.value='';}

function generatePyScript(){
  // Récupérer le nom du fichier HTML courant pour que le script serve le bon fichier
  var htmlFile=location.pathname.split('/').pop()||'editeur-lheo-edof.html';
  var py='#!/usr/bin/env python3\n'+
'# Serveur local pour Editeur LHEO EDOF\n'+
'# Placez ce fichier dans le meme dossier que '+htmlFile+'\n'+
'# Lancez avec : python lancer-editeur.py\n'+
'# Puis ouvrez : http://localhost:8765/'+htmlFile+'\n\n'+
'import sys\n'+
'try:\n'+
'    import http.server, socketserver, os, urllib.request, json, threading, webbrowser, ssl\n'+
'    ctx = ssl.create_default_context()\n'+
'    ctx.check_hostname = False\n'+
'    ctx.verify_mode = ssl.CERT_NONE\n'+
'except ImportError as e:\n'+
'    print(f"Erreur import : {e}")\n'+
'    input("Appuyez sur Entree pour fermer...")\n'+
'    sys.exit(1)\n\n'+
'PORT = 8765\n'+
'DIR = os.path.dirname(os.path.abspath(__file__))\n\n'+
'class Handler(http.server.SimpleHTTPRequestHandler):\n'+
'    def __init__(self, *a, **kw):\n'+
'        super().__init__(*a, directory=DIR, **kw)\n\n'+
'    def do_GET(self):\n'+
'        if self.path.startswith(\'/proxy/apprentissage/\'):\n'+
'            rncp = self.path.split(\'identifiant.rncp=\')[-1].split(\'&\')[0]\n'+
'            token = self.headers.get(\'X-App-Token\',\'\')\n'+
'            # Fallback: token hardcode si non transmis par le navigateur\n'+
'            if not token: token = "'+API_APPRENTISSAGE_TOKEN+'"\n'+
'            url = f\'https://api.apprentissage.beta.gouv.fr/api/certification/v1?identifiant.rncp={rncp}\'\n'+
'            req = urllib.request.Request(url, headers={\n'+
'                \'Authorization\': f\'Bearer {token}\',\n'+
'                \'Accept\': \'application/json\'\n'+
'            })\n'+
'            try:\n'+
'                with urllib.request.urlopen(req, timeout=10, context=ctx) as r:\n'+
'                    data = r.read()\n'+
'                self.send_response(200)\n'+
'                self.send_header(\'Content-Type\', \'application/json\')\n'+
'                self.send_header(\'Access-Control-Allow-Origin\', \'*\')\n'+
'                self.end_headers()\n'+
'                self.wfile.write(data)\n'+
'            except Exception as e:\n'+
'                self.send_response(500)\n'+
'                self.send_header(\'Content-Type\', \'application/json\')\n'+
'                self.send_header(\'Access-Control-Allow-Origin\', \'*\')\n'+
'                self.end_headers()\n'+
'                self.wfile.write(json.dumps({\'error\': str(e)}).encode())\n'+
'            return\n'+
'        super().do_GET()\n\n'+
'    def do_OPTIONS(self):\n'+
'        self.send_response(200)\n'+
'        self.send_header(\'Access-Control-Allow-Origin\', \'*\')\n'+
'        self.send_header(\'Access-Control-Allow-Headers\', \'Content-Type, X-App-Token\')\n'+
'        self.end_headers()\n\n'+
'    def log_message(self, fmt, *args): pass\n\n'+
'print(f"Editeur LHEO disponible sur : http://localhost:{PORT}/'+htmlFile+'")\n'+
'print("Appuyez sur Ctrl+C pour arreter.")\n'+
'import webbrowser, threading\n'+
'threading.Timer(1, lambda: webbrowser.open(f"http://localhost:{PORT}/'+htmlFile+'")).start()\n'+
'try:\n'+
'    with socketserver.TCPServer((\'\', PORT), Handler) as httpd:\n'+
'        try: httpd.serve_forever()\n'+
'        except KeyboardInterrupt: print(\'\\nArrete.\')\n'+
'except OSError as e:\n'+
'    print(f"\\nERREUR : {e}")\n'+
'    print(f"Le port {PORT} est peut-etre deja utilise.")\n'+
'    print("Fermez les autres instances ou relancez le script.")\n'+
'    input("\\nAppuyez sur Entree pour fermer...")\n';

  var b=new Blob([py],{type:'text/plain;charset=utf-8'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');
  a.href=u;a.download='lancer-editeur.py';a.click();
  URL.revokeObjectURL(u);

  // Générer aussi le .bat Windows pour forcer l'ouverture dans une vraie console
  var bat='@echo off\r\n'+
'title Editeur LHEO EDOF - Serveur local\r\n'+
'echo Demarrage du serveur LHEO EDOF...\r\n'+
'echo.\r\n'+
'python --version >nul 2>&1\r\n'+
'if errorlevel 1 (\r\n'+
'    echo ERREUR : Python n^\'est pas installe ou pas dans le PATH.\r\n'+
'    echo Telechargez Python sur https://www.python.org/downloads/\r\n'+
'    echo Cochez "Add Python to PATH" lors de l^\'installation.\r\n'+
'    pause\r\n'+
'    exit /b 1\r\n'+
')\r\n'+
'python lancer-editeur.py\r\n'+
'if errorlevel 1 (\r\n'+
'    echo.\r\n'+
'    echo Le serveur s^\'est arrete avec une erreur.\r\n'+
'    pause\r\n'+
')\r\n';

  setTimeout(function(){
    var b2=new Blob([bat],{type:'text/plain;charset=utf-8'});
    var u2=URL.createObjectURL(b2);
    var a2=document.createElement('a');
    a2.href=u2;a2.download='lancer-editeur.bat';a2.click();
    URL.revokeObjectURL(u2);
    toast('Fichiers telecharges : lancer-editeur.py + lancer-editeur.bat — Double-cliquez sur le .bat');
  }, 500);
}

showWelcome();drawList();

  else if(val==='vae'){ff.objGen='6';ff.certif='O';ff.cpf='CPF200';ff.rncp='';ff.rs='';}

  else{ff.certif=ff.certif||'N';}
  L.persist();L.openEditor(L.curId);
}

function fetchBlocs(){
  var L=window._lheo;
  if(!L){alert('Logiciel non pret, patientez et reessayez');return;}
  L.doSave(L.curId,true);
  var ff=L.cat.find(function(x){return x.id===L.curId;});
  if(!ff||!ff.rncp){alert('Saisissez un code RNCP (ex: RNCP41426 ou 41426) et enregistrez');return;}
  var rncp=ff.rncp.trim().toUpperCase();
  if(/^\d+$/.test(rncp))rncp='RNCP'+rncp;
  if(!/^RNCP\d+$/.test(rncp)){alert('Format invalide, ex: RNCP41426 ou 41426');return;}
  var st=document.getElementById('E_blocs_status');
  if(st)st.textContent='Chargement '+rncp+'...';
  function callApi(url,headers){
    return fetch(url,{headers:headers}).then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}
  callApi('http://localhost:8765/proxy/apprentissage/?identifiant.rncp='+rncp,
    {'X-App-Token':API_APPRENTISSAGE_TOKEN})
  .then(function(data){if(st)st.textContent='';applyRncpData(ff,rncp,data,st);})
  .catch(function(e1){
    callApi('https://api.apprentissage.beta.gouv.fr/api/certification/v1?identifiant.rncp='+rncp,
      {'Authorization':'Bearer '+API_APPRENTISSAGE_TOKEN,'Accept':'application/json'})
    .then(function(data){if(st)st.textContent='';applyRncpData(ff,rncp,data,st);})
    .catch(function(e2){if(st)st.textContent='Echec';
      alert('Erreur:\nProxy: '+e1.message+'\nDirect: '+e2.message);});});}

function applyRncpData(ff,rncp,data,st){
  var L=window._lheo;
  if(!data||!data[0]){alert(rncp+' introuvable dans France Competences');return;}
  var d=data[0];var maj=[];
  var intitule=(d.intitule&&d.intitule.rncp)||'';
  if(intitule&&!ff.intitule){ff.intitule=intitule;maj.push('intitule');}
  var niveauEU=(d.intitule&&d.intitule.niveau&&d.intitule.niveau.rncp&&d.intitule.niveau.rncp.europeen)||'';
  if(niveauEU){var nivMap={'2':'3','3':'3','4':'4','5':'5','6':'6','7':'7','8':'8'};
    ff.nivS=nivMap[String(niveauEU)]||'9';maj.push('niveau');}
  var fc=((d.domaines&&d.domaines.formacodes&&d.domaines.formacodes.rncp)||[]).map(function(x){return x.code;});
  if(fc.length&&(!ff.formacode||!ff.formacode.length)){ff.formacode=fc.slice(0,5);maj.push('Formacode');}
  var nsf=((d.domaines&&d.domaines.nsf&&d.domaines.nsf.rncp)||[]).map(function(x){return x.code;});
  if(nsf.length&&(!ff.nsf||!ff.nsf.length)){ff.nsf=nsf.slice(0,3);maj.push('NSF');}
  var rome=((d.domaines&&d.domaines.rome&&d.domaines.rome.rncp)||[]).map(function(x){return x.code;});
  if(rome.length&&(!ff.rome||!ff.rome.length)){ff.rome=rome.slice(0,5);maj.push('ROME');}
  var blocs=((d.blocs_competences&&d.blocs_competences.rncp)||[]);
  if(blocs.length){blocs.sort(function(a,b){return a.code.localeCompare(b.code);});
    ff.blocsCompetences=blocs.map(function(b){return b.code+'||'+b.intitule;});maj.push(blocs.length+' blocs');}
  ff.certif='O';if(ff.objGen==='7')ff.objGen='6';
  L.persist();L.openEditor(L.curId);if(st)st.textContent='';
  alert('Import OK pour '+rncp+'\nChamps importes : '+(maj.length?maj.join(', '):'aucun nouveau'));}

function addBloc(){
  var L=window._lheo;if(!L)return;
  L.doSave(L.curId,true);
  var ff=L.cat.find(function(x){return x.id===L.curId;});if(!ff)return;
  ff.blocsCompetences=ff.blocsCompetences||[];ff.blocsCompetences.push('');
  L.persist();L.openEditor(L.curId);
  setTimeout(function(){var inputs=document.querySelectorAll('[id^="E_bloc_"]');
    if(inputs.length)inputs[inputs.length-1].focus();},100);}

function removeBloc(i){
  var L=window._lheo;if(!L)return;
  L.doSave(L.curId,true);
  var ff=L.cat.find(function(x){return x.id===L.curId;});if(!ff)return;
  ff.blocsCompetences.splice(i,1);L.persist();L.openEditor(L.curId);}
